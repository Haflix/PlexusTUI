general:
  hostname: tui-smoke-host
  console_log_level: WARNING
  plugin_package: plugins_test
  asyncio_debug: false

# Networking is DISABLED for the showcase. The framework's K-3 gate
# rejects an empty `peers:` list (mTLS trust store would be empty),
# and a real peer demo would need two terminals + paired configs.
# Networking-tab in the TUI will show the greyed "Networking
# disabled" banner — this exercises the Phase 1 disabled-state UI
# (Phase 0 Settings-tab disabled-state is also exercised).
#
# To demo a populated Peers table:
#   1. Run two `python tui_smoke.py` instances on two machines (or
#      two ports), each with the OTHER node's cert PEM + fingerprint
#      in their `networking.peers` block.
#   2. Generate cert PEMs first via `python -m networking_cli`.
networking:
  enabled: false

plugins:
  - name: TUI
    enabled: true
    path: ./plugins/PlexusTUI
  - name: TUIDemoPub
    enabled: true
  - name: TUIDemoSub
    enabled: true
  # Auto-fires demo events every 3s so Live-stream is always alive.
  - name: TUIDemoTimer
    enabled: true
  # Multi-target subscriber + streaming endpoint demo.
  - name: TUIDemoOrch
    enabled: true
  # Loaded but DISABLED so the Plugins-table Phase column shows a
  # "DISABLED" row alongside the "READY" rows. Lives inside PlexusTUI's
  # examples/ as a reference custom-tab plugin.
  - name: TUIDemoSpare
    enabled: false
    path: ./plugins/PlexusTUI/examples/TUIDemoSpare
